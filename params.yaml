base:
  random_state: 42
  target: Price

data:
  test_size: 0.2
  raw_path: data/raw/house_price.csv
  processed_train: data/processed/train.csv
  processed_test: data/processed/test.csv

features:
  drop_cols: ['Id']
  numerical: ['Area', 'Bedrooms', 'Bathrooms', 'Floors', 'YearBuilt']
  categorical: ['Location', 'Condition', 'Garage']
  correlation_threshold: 0.0   # 0.0 = keep all features

model:
  # ── Random Forest ──
  n_estimators: 100
  max_depth: 10
  min_samples_split: 5
  min_samples_leaf: 2

  # ── Decision Tree ──
  dt_max_depth: 5
  dt_min_samples_split: 10

  # ── Ridge ──
  ridge_alpha: 1.0       # L2 penalty strength

  # ── Lasso ──
  lasso_alpha: 1.0       # L1 penalty strength

  # ── ElasticNet ──
  elasticnet_alpha: 1.0
  elasticnet_l1_ratio: 0.5   # 0=Ridge, 1=Lasso, 0.5=equal mix

  # ── XGBoost ──
  xgb_n_estimators: 100
  xgb_max_depth: 6
  xgb_learning_rate: 0.1
  xgb_subsample: 0.8

  # ── LightGBM ──
  lgb_n_estimators: 100
  lgb_max_depth: 6
  lgb_learning_rate: 0.1
  lgb_num_leaves: 31

evaluate:
  metrics_path: data/reports/metrics.json

monitoring:
  drift_threshold: 0.05
  report_path: data/reports/drift_report.html